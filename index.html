<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nick's Shortcut's</title>

<style>
:root{
 --bg:#f5f7fc;
 --card:#ffffffd8;
 --text:#111;
 --muted:#666;
 --accent:#4f46e5;
}
body.dark{
 --bg:#0b0f18;
 --card:#151a22dd;
 --text:#fff;
 --muted:#aaa;
 --accent:#7c7cff;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
 background:var(--bg);
 color:var(--text);
 font-family:system-ui;
 transition:.3s;
 overflow-x:hidden;
}

/* ===== Animated gradient ===== */
body::before{
 content:"";
 position:fixed;
 inset:-30%;
 background:
 radial-gradient(circle at 20% 20%,#5b8cff66,transparent 50%),
 radial-gradient(circle at 80% 70%,#7c4dff66,transparent 50%);
 filter:blur(80px);
 z-index:-1;
 animation:move 15s infinite alternate ease-in-out;
}
@keyframes move{
 from{transform:translate(0,0)}
 to{transform:translate(60px,-60px)}
}

/* ===== Toolbar ===== */
header{
 position:sticky;
 top:0;
 z-index:999;
 display:flex;
 gap:10px;
 padding:14px;
 backdrop-filter:blur(12px);
 background:rgba(255,255,255,.6);
}
body.dark header{background:rgba(10,12,18,.6)}

input,select,button{
 border:none;
 padding:10px 14px;
 border-radius:12px;
 background:var(--card);
 color:var(--text);
}
input{flex:1}
button{cursor:pointer}

/* ===== Grid ===== */
.grid{
 max-width:1600px;
 margin:auto;
 padding:20px;
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
 gap:16px;
}

.card{
 background:var(--card);
 border-radius:16px;
 padding:14px;
 display:flex;
 gap:10px;
 align-items:center;
 transition:.22s;
 transform:translateY(20px);
 opacity:0;
 will-change:transform;
}
.card.show{opacity:1;transform:translateY(0)}

.card:hover{
 transform:scale(1.08);
 z-index:4;
}

.icon{width:24px;height:24px}
.name{font-weight:700}
.cat{font-size:12px;color:var(--muted)}

.star{
 margin-left:auto;
 cursor:pointer;
 font-size:18px;
}
.star.active{color:gold}

/* ===== Command palette ===== */
#cmd{
 position:fixed;
 top:20%;
 left:50%;
 transform:translateX(-50%);
 width:600px;
 max-width:90%;
 background:var(--card);
 border-radius:14px;
 padding:12px;
 display:none;
 box-shadow:0 15px 40px rgba(0,0,0,.3);
 z-index:2000;
}
#cmd input{width:100%}
</style>
</head>

<body>

<header>
 <input id="search" placeholder="Search ( / )">
 <select id="category"><option value="all">All</option></select>
 <button id="theme">🌙</button>
</header>

<div class="grid" id="grid"></div>

<div id="cmd">
 <input id="cmdInput" placeholder="Command palette...">
</div>

<script src="sites.js"></script>
<script>

const grid=document.getElementById("grid");
const search=document.getElementById("search");
const cat=document.getElementById("category");

let fav=JSON.parse(localStorage.getItem("fav")||"[]");
let usage=JSON.parse(localStorage.getItem("usage")||"{}");

function favicon(url){
 return "https://www.google.com/s2/favicons?domain="+url+"&sz=64";
}

/* categories */
[...new Set(sites.map(s=>s.category))]
.sort().forEach(c=>{
 let o=document.createElement("option");
 o.value=c;o.textContent=c;
 cat.appendChild(o);
});

function fuzzy(text,q){
 return text.toLowerCase().includes(q.toLowerCase());
}

function sortRank(a,b){
 const ua=usage[a.name]||0;
 const ub=usage[b.name]||0;
 return (b.score+ub*5)-(a.score+ua*5);
}

function render(){
 grid.innerHTML="";
 let q=search.value;
 let c=cat.value;

 let list=[...sites].sort(sortRank);

 list.forEach(s=>{
  if(q && !fuzzy(s.name,q)) return;
  if(c!=="all" && s.category!==c) return;

  const isFav=fav.includes(s.name);

  const el=document.createElement("a");
  el.href=s.url;
  el.target="_blank";

  el.onclick=()=>{
   usage[s.name]=(usage[s.name]||0)+1;
   localStorage.setItem("usage",JSON.stringify(usage));
  };

  el.innerHTML=`
   <div class="card">
    <img class="icon" src="${favicon(s.url)}">
    <div>
      <div class="name">${s.name}</div>
      <div class="cat">${s.category}</div>
    </div>
    <div class="star ${isFav?'active':''}" data="${s.name}">★</div>
   </div>
  `;
  grid.appendChild(el);
 });

 reveal();
 bindStars();
 dockEffect();
}

function bindStars(){
 document.querySelectorAll(".star").forEach(st=>{
  st.onclick=(e)=>{
   e.preventDefault();e.stopPropagation();
   let n=st.getAttribute("data");
   let i=fav.indexOf(n);
   if(i>-1) fav.splice(i,1);
   else fav.push(n);
   localStorage.setItem("fav",JSON.stringify(fav));
   render();
  };
 });
}

/* Dock magnify */
function dockEffect(){
 const cards=document.querySelectorAll(".card");
 cards.forEach(card=>{
  card.onmousemove=e=>{
   const r=card.getBoundingClientRect();
   const x=(e.clientX-r.left)/r.width-.5;
   const y=(e.clientY-r.top)/r.height-.5;
   card.style.transform=
   `scale(1.1) rotateY(${x*8}deg) rotateX(${y*-8}deg)`;
  };
  card.onmouseleave=()=>card.style.transform="";
 });
}

function reveal(){
 const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
   if(e.isIntersecting)e.target.classList.add("show");
  });
 });
 document.querySelectorAll(".card").forEach(c=>obs.observe(c));
}

search.oninput=render;
cat.onchange=render;

/* theme */
document.getElementById("theme").onclick=()=>{
 document.body.classList.toggle("dark");
 localStorage.setItem("theme",
 document.body.classList.contains("dark")?"dark":"light");
};
if(localStorage.getItem("theme")==="dark")
 document.body.classList.add("dark");

/* keyboard */
document.addEventListener("keydown",e=>{
 if(e.key==="/"){e.preventDefault();search.focus();}
 if(e.ctrlKey && e.key.toLowerCase()==="k"){
  e.preventDefault();
  document.getElementById("cmd").style.display="block";
  document.getElementById("cmdInput").focus();
 }
});

document.getElementById("cmdInput").onkeydown=e=>{
 if(e.key==="Escape") document.getElementById("cmd").style.display="none";
};

render();

</script>
</body>
</html>
