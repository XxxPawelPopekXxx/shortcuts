<style>
/* =====================================================
   ROOT VARIABLES
===================================================== */
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#111;
  --muted:#666;
  --accent:#4f46e5;
  --shadow:0 8px 25px rgba(0,0,0,.08);
}

body.dark{
  --bg:#0f1117;
  --card:#1a1d26;
  --text:#fff;
  --muted:#bbb;
  --accent:#7c7cff;
  --shadow:0 8px 25px rgba(0,0,0,.45);
}

/* =====================================================
   BASE
===================================================== */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:.35s;
  overflow-x:hidden;
}
a{text-decoration:none;color:inherit}

/* =====================================================
   HEADER
===================================================== */
header{
  position:sticky;
  top:0;
  backdrop-filter:blur(12px);
  background:rgba(255,255,255,.7);
  border-bottom:1px solid rgba(0,0,0,.08);
  padding:15px 30px;
  z-index:999;
}
body.dark header{
  background:rgba(15,17,23,.7);
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
}

h1{
  font-size:1.4rem;
  font-weight:700;
}

.controls{
  display:flex;
  gap:10px;
}

input,select,button{
  border:none;
  background:var(--card);
  color:var(--text);
  padding:10px 14px;
  border-radius:12px;
  box-shadow:var(--shadow);
}

button{
  cursor:pointer;
  transition:.2s;
}
button:hover{
  transform:translateY(-2px);
}

/* =====================================================
   GRID
===================================================== */
main{
  max-width:1400px;
  margin:auto;
  padding:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:18px;
}

.card{
  background:var(--card);
  border-radius:18px;
  padding:18px;
  display:flex;
  align-items:center;
  gap:12px;
  box-shadow:var(--shadow);
  transition:.3s;
  opacity:0;
  transform:translateY(30px);
}

.card.show{
  opacity:1;
  transform:translateY(0);
}

.card:hover{
  transform:translateY(-6px) scale(1.02);
}

.card img{
  width:24px;
  height:24px;
}

.card h3{
  font-size:15px;
  font-weight:600;
}

.tag{
  font-size:12px;
  color:var(--muted);
}

/* =====================================================
   FOOTER
===================================================== */
footer{
  text-align:center;
  padding:50px 20px;
  color:var(--muted);
}

/* =====================================================
   SCROLL ANIMATION
===================================================== */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}

/* =====================================================
   RESPONSIVE
===================================================== */
@media(max-width:700px){
  header{padding:15px}
  main{padding:15px}
}
</style>
</head>

<body>

<header>

    <h1>⚡ Nick's Shortcut's Hub</h1>
    <div class="controls">

/* =====================================================
   BUILD CATEGORY OPTIONS
===================================================== */
const categorySelect=document.getElementById("category");
[...new Set(sites.map(s=>s[2]))].sort().forEach(c=>{
  const opt=document.createElement("option");
  opt.value=c;
  opt.textContent=c;
  categorySelect.appendChild(opt);
});

/* =====================================================
   RENDER
===================================================== */
const grid=document.getElementById("grid");

function favicon(url){
  return "https://www.google.com/s2/favicons?domain="+url+"&sz=64";
}

function render(){
  grid.innerHTML="";
  const search=document.getElementById("search").value.toLowerCase();
  const cat=categorySelect.value;

  sites.forEach((s,i)=>{
    if(search && !s[0].toLowerCase().includes(search)) return;
    if(cat!=="all" && s[2]!==cat) return;

    const a=document.createElement("a");
    a.href=s[1];
    a.target="_blank";

    a.innerHTML=`
      <div class="card">
        <img src="${favicon(s[1])}">
        <div>
          <h3>${s[0]}</h3>
          <div class="tag">${s[2]}</div>
        </div>
      </div>
    `;

    grid.appendChild(a);
  });

  animateCards();
}

/* =====================================================
   SCROLL REVEAL
===================================================== */
function animateCards(){
  const cards=document.querySelectorAll(".card");
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.classList.add("show");
      }
    });
  },{threshold:.1});

  cards.forEach(c=>obs.observe(c));
}

/* =====================================================
   EVENTS
===================================================== */
document.getElementById("search").addEventListener("input",render);
categorySelect.addEventListener("change",render);

/* =====================================================
   THEME TOGGLE
===================================================== */
const btn=document.getElementById("themeBtn");
btn.onclick=()=>{
  document.body.classList.toggle("dark");
  localStorage.setItem("theme",
    document.body.classList.contains("dark")?"dark":"light");
};

if(localStorage.getItem("theme")==="dark"){
  document.body.classList.add("dark");
}

/* INIT */
render();
